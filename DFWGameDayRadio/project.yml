name: DFWGameDayRadio
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  DFWGameDayRadio:
    type: application
    platform: iOS
    sources:
      - path: DFWGameDayRadio
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: DFWGameDayRadio/Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.DFWGameDayRadio
        CODE_SIGN_ENTITLEMENTS: DFWGameDayRadio/Resources/DFWGameDayRadio.entitlements
        SUPPORTS_LIVE_ACTIVITIES: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"  # iPhone only
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
    entitlements:
      path: DFWGameDayRadio/Resources/DFWGameDayRadio.entitlements
    dependencies:
      - target: DFWGameDayRadioWidget
        embed: true

  DFWGameDayRadioWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: DFWGameDayRadioWidget
        excludes:
          - "**/.DS_Store"
      - path: Shared
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        INFOPLIST_FILE: DFWGameDayRadioWidget/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.DFWGameDayRadio.ScoreWidget
        SUPPORTS_LIVE_ACTIVITIES: "YES"
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
